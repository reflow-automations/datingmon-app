<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 40" shape-rendering="crispEdges" width="36" height="40">
  <!-- Player — female trainer, back view (original pixel art) -->
  <ellipse cx="18" cy="38.5" rx="12" ry="1.7" fill="rgba(0,0,0,.18)"/>

  <!-- back of head / hair (brown) -->
  <rect x="10" y="2"  width="16" height="2"  fill="#7a4a2c"/>
  <rect x="9"  y="4"  width="18" height="8"  fill="#6b4226"/>
  <rect x="10" y="3"  width="9"  height="2"  fill="#875235"/>
  <rect x="9"  y="5"  width="2"  height="6"  fill="#5a3720"/>
  <rect x="25" y="5"  width="2"  height="6"  fill="#5a3720"/>
  <!-- hair strands texture -->
  <rect x="12" y="6"  width="1"  height="5"  fill="#5a3720"/>
  <rect x="18" y="6"  width="1"  height="5"  fill="#5a3720"/>
  <rect x="23" y="6"  width="1"  height="5"  fill="#5a3720"/>

  <!-- ponytail down the back -->
  <rect x="15" y="10" width="6"  height="2"  fill="#7a4a2c"/>
  <rect x="14" y="12" width="8"  height="11" fill="#6b4226"/>
  <rect x="15" y="23" width="6"  height="4"  fill="#5a3720"/>
  <rect x="16" y="14" width="1"  height="11" fill="#7a4a2c"/>
  <rect x="19" y="14" width="1"  height="11" fill="#5a3720"/>
  <!-- hair tie -->
  <rect x="15" y="11" width="6"  height="1"  fill="#f0608c"/>

  <!-- jacket back (cute red) -->
  <rect x="8"  y="13" width="20" height="15" fill="#e0556f"/>
  <rect x="8"  y="13" width="20" height="2"  fill="#f47d92"/>
  <rect x="8"  y="25" width="20" height="3"  fill="#c23a55"/>
  <rect x="9"  y="15" width="2"  height="9"  fill="#ec6c84"/>
  <rect x="25" y="15" width="2"  height="9"  fill="#c23a55"/>
  <!-- ponytail overlaps jacket -->
  <rect x="14" y="13" width="8"  height="10" fill="#6b4226"/>
  <rect x="16" y="13" width="1"  height="10" fill="#7a4a2c"/>
  <rect x="19" y="13" width="1"  height="10" fill="#5a3720"/>

  <!-- arms / hands -->
  <rect x="6"  y="14" width="2"  height="11" fill="#e0556f"/>
  <rect x="28" y="14" width="2"  height="11" fill="#e0556f"/>
  <rect x="6"  y="24" width="3"  height="3"  fill="#f2c594"/>
  <rect x="27" y="24" width="3"  height="3"  fill="#f2c594"/>

  <!-- pants / legs -->
  <rect x="11" y="28" width="14" height="7"  fill="#2a3340"/>
  <rect x="17" y="28" width="2"  height="7"  fill="#1f2630"/>
  <!-- shoes -->
  <rect x="10" y="35" width="6"  height="2"  fill="#f4f4f4"/>
  <rect x="20" y="35" width="6"  height="2"  fill="#f4f4f4"/>
  <rect x="10" y="36" width="6"  height="1"  fill="#cfd6df"/>
  <rect x="20" y="36" width="6"  height="1"  fill="#cfd6df"/>
</svg>
